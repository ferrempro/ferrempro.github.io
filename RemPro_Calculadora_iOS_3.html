<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1c1f1a">
<title>RemPro · Calculadora de Insumos</title>

<style>
  :root{
    --bg: #f6f4ee;
    --panel: #ffffff;
    --ink: #1c1f1a;
    --ink-soft: #5b5e55;
    --line: #e1ddd2;
    --accent: #c5601f;
    --accent-soft: #f3e3d4;
    --muro: #2f4a3a;
    --plafon: #3a5f8a;
    --ok: #2f6b3f;
    --radius: 14px;
    --serif: "Source Serif Pro", Georgia, "Times New Roman", serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 40px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{
    max-width: 560px;
    margin: 0 auto;
    padding: 0 18px;
  }

  /* Header */
  header.hero{
    padding: env(safe-area-inset-top, 24px) 0 0 0;
    margin-bottom: 8px;
  }
  .hero-inner{
    padding: 28px 0 22px;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 6px;
  }
  h1{
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .subtitle{
    font-size: 13.5px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.5;
  }

  /* Selector */
  .selector{
    display: flex;
    gap: 10px;
    margin: 18px 0;
  }
  .selector button{
    flex: 1;
    padding: 16px 12px;
    border-radius: var(--radius);
    border: 1.5px solid var(--line);
    background: var(--panel);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .selector button .tag{
    display:block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.6;
  }
  .selector button.active{
    color: #fff;
    border-color: transparent;
  }
  .selector button[data-mode="muro"].active{ background: var(--muro); }
  .selector button[data-mode="plafon"].active{ background: var(--plafon); }
  .selector button.active .tag{ opacity: 0.75; }

  /* Card */
  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }
  .card h2{
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 14px;
  }
  .field-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .field{
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label{
    font-size: 11.5px;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .field input, .field select{
    font-family: var(--mono);
    font-size: 16px;
    padding: 11px 12px;
    border-radius: 9px;
    border: 1.5px solid var(--line);
    background: #fdfcfa;
    color: var(--ink);
    width: 100%;
    appearance: none;
  }
  .field select{
    font-family: var(--sans);
    font-weight: 500;
  }
  .field input:focus, .field select:focus{
    outline: none;
    border-color: var(--accent);
  }
  .toggle-row{
    display:flex;
    gap:8px;
    margin-bottom: 12px;
  }
  .toggle-row .field{ flex:1; }
  .pill-group{
    display:flex;
    gap:8px;
  }
  .pill{
    flex:1;
    padding: 10px 8px;
    border-radius: 9px;
    border: 1.5px solid var(--line);
    background: #fdfcfa;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    text-align:center;
    cursor:pointer;
    transition: all 0.15s ease;
  }
  .pill.active{
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* Result */
  .result-box{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    background: var(--ink);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px;
    margin: 4px 0 14px;
  }
  .result-box .label{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 6px;
    display:block;
  }
  .result-box .value{
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 600;
    line-height: 1;
  }
  .result-box .unit{
    font-family: var(--sans);
    font-size: 14px;
    opacity: 0.55;
    margin-left: 6px;
  }
  .result-box .area-detail{
    text-align: right;
    font-size: 12px;
    line-height: 1.6;
    opacity: 0.7;
    font-family: var(--mono);
  }

  /* Insumos table */
  .insumos h2{
    display:flex;
    align-items:center;
    justify-content: space-between;
  }
  .insumos h2 .count{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .group{
    margin-bottom: 16px;
  }
  .group:last-child{ margin-bottom: 0; }
  .group-title{
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }
  .item-row{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 7px 0;
    font-size: 14px;
    border-bottom: 1px solid #f1efe8;
  }
  .item-row:last-child{ border-bottom: none; }
  .item-name{
    color: var(--ink);
  }
  .item-name .sub{
    display:block;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 1px;
  }
  .item-qty{
    font-family: var(--mono);
    font-weight: 600;
    white-space: nowrap;
    padding-left: 12px;
    text-align:right;
  }
  .item-qty .u{
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-left: 3px;
  }

  .empty-state{
    text-align:center;
    padding: 28px 16px;
    color: var(--ink-soft);
    font-size: 13.5px;
    line-height: 1.6;
  }
  .empty-state .glyph{
    font-family: var(--serif);
    font-size: 30px;
    color: var(--line);
    margin-bottom: 8px;
  }

  footer{
    text-align:center;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    padding: 22px 0 10px;
    opacity: 0.55;
  }

  /* Buttons */
  .btn-primary, .btn-secondary{
    width: 100%;
    padding: 13px 16px;
    border-radius: 9px;
    border: none;
    font-family: var(--sans);
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 4px;
  }
  .btn-primary{
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover{ opacity: 0.9; }
  .btn-primary:active{ transform: scale(0.99); }
  .btn-secondary{
    background: var(--ink);
    color: #fff;
  }
  .btn-secondary:hover{ opacity: 0.9; }

  /* Áreas guardadas */
  .area-card{
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .area-card:last-child{ margin-bottom: 0; }
  .area-info .area-name{
    font-weight: 600;
    font-size: 14px;
    margin: 0 0 2px;
  }
  .area-info .area-meta{
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-soft);
  }
  .area-tag{
    display:inline-block;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 6px;
    color: #fff;
  }
  .area-tag.muro{ background: var(--muro); }
  .area-tag.plafon{ background: var(--plafon); }
  .area-delete{
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .area-delete:hover{
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* Consolidado */
  .consol-group{
    margin-bottom: 14px;
  }
  .consol-group:last-child{ margin-bottom: 0; }
  .consol-row{
    display:flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13.5px;
    border-bottom: 1px solid #f1efe8;
  }
  .consol-row:last-child{ border-bottom: none; }
  .consol-row .name{ color: var(--ink); }
  .consol-row .qty{
    font-family: var(--mono);
    font-weight: 600;
    white-space: nowrap;
    padding-left: 12px;
  }
  .consol-row .qty .u{
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-left: 3px;
  }

  /* Lista de muros / plafones */
  .lista-row{
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 9px 0;
    border-bottom: 1px solid #f1efe8;
    gap: 10px;
  }
  .lista-row:last-child{ border-bottom: none; }
  .lista-row .lista-info .lista-nombre{
    font-weight: 600;
    font-size: 14px;
    margin: 0 0 2px;
  }
  .lista-row .lista-info .lista-ubicacion{
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-soft);
  }
  .lista-row .lista-m2{
    font-family: var(--mono);
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    text-align: right;
    flex-shrink: 0;
  }
  .lista-row .lista-m2 .u{
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-left: 3px;
  }
  .lista-row .lista-delete{
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0 0 0 8px;
    flex-shrink: 0;
  }
  .lista-row .lista-delete:hover{ color: var(--accent); }
  .lista-total{
    display:flex;
    justify-content: space-between;
    padding-top: 10px;
    margin-top: 4px;
    border-top: 1.5px solid var(--ink);
    font-weight: 700;
    font-size: 14.5px;
  }
  .lista-total .qty{
    font-family: var(--mono);
  }
  .lista-total .qty .u{
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-left: 3px;
  }

  /* APU — Análisis de Precios Unitarios */
  .apu-meta{
    display:flex; gap:16px; flex-wrap:wrap;
    font-family:var(--mono); font-size:11.5px;
    color:var(--ink-soft); margin-bottom:14px;
    padding-bottom:10px; border-bottom:1px solid var(--line);
  }
  .apu-meta span b{ color:var(--ink); }
  .apu-seccion{ margin-bottom:14px; }
  .apu-seccion-titulo{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--accent);
    margin:0 0 6px; padding-bottom:5px; border-bottom:1px solid var(--line);
  }
  .apu-tabla{ width:100%; border-collapse:collapse; font-size:12.5px; }
  .apu-tabla th{
    text-align:left; font-family:var(--mono); font-size:10px;
    font-weight:600; color:var(--ink-soft); letter-spacing:.06em;
    padding:4px 6px 4px 0; border-bottom:1px solid var(--line);
  }
  .apu-tabla th:not(:first-child){ text-align:right; }
  .apu-tabla td{
    padding:5px 6px 5px 0; border-bottom:1px solid #f1efe8;
    vertical-align:top; line-height:1.3;
  }
  .apu-tabla td:not(:first-child){
    text-align:right; font-family:var(--mono); white-space:nowrap;
  }
  .apu-tabla tr:last-child td{ border-bottom:none; }
  .apu-tabla .sub{
    display:block; font-size:10.5px; color:var(--ink-soft);
    font-family:var(--mono);
  }
  .apu-subtotal td{
    font-weight:700; border-top:1px solid var(--line) !important;
    border-bottom:none !important; padding-top:8px !important;
    font-family:var(--mono);
  }
  .apu-total-directo{
    display:flex; justify-content:space-between; align-items:baseline;
    padding:10px 0 6px; border-top:1.5px solid var(--ink); margin-top:4px;
    font-weight:700; font-size:14px;
  }
  .apu-total-directo .qty{ font-family:var(--mono); font-size:16px; }
  .apu-pu{
    display:flex; justify-content:space-between; align-items:baseline;
    padding:8px 12px; background:var(--ink); color:#fff;
    border-radius:10px; margin-top:10px;
    font-weight:700; font-size:13.5px;
  }
  .apu-pu .qty{
    font-family:var(--mono); font-size:20px; color:var(--accent-soft);
  }
  .apu-mo-input-row{
    display:flex; align-items:center; gap:10px;
    margin-bottom:12px; padding:10px 12px;
    background:var(--accent-soft); border-radius:9px;
  }
  .apu-mo-input-row label{
    font-size:12.5px; font-weight:600; flex:1;
    color:var(--ink);
  }
  .apu-mo-input-row .cat-peso{ font-size:13px; color:var(--ink-soft); }
  .apu-mo-input-row input{
    font-family:var(--mono); font-size:15px; font-weight:700;
    width:90px; padding:7px 8px; text-align:right;
    border:1.5px solid var(--line); border-radius:7px;
    background:#fff; color:var(--ink);
  }
  .apu-mo-input-row input:focus{ outline:none; border-color:var(--accent); }

  /* Precio Neto */
  .pneto-row{
    display:flex; justify-content:space-between; align-items:baseline;
    padding:7px 0; border-bottom:1px solid #f1efe8; font-size:13.5px;
  }
  .pneto-row:last-child{ border-bottom:none; }
  .pneto-row .label{ flex:1; }
  .pneto-row .qty{ font-family:var(--mono); font-weight:600; padding-left:12px; }
  .pneto-total{
    display:flex; justify-content:space-between; align-items:baseline;
    padding:10px 0 4px; margin-top:6px;
    border-top:2px solid var(--ink); font-weight:700; font-size:15px;
  }
  .pneto-total .qty{ font-family:var(--mono); font-size:18px; color:var(--accent); }

  /* Módulo de Destajo */
  .destajo-partida{
    border-radius:10px;
    border:1px solid var(--line);
    margin-bottom:10px;
    overflow:hidden;
  }
  .destajo-partida:last-child{ margin-bottom:0; }
  .destajo-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    font-weight:700;
    font-size:14px;
  }
  .destajo-header .pct{
    font-family:var(--mono);
    font-size:11px;
    font-weight:600;
    letter-spacing:.06em;
    opacity:.7;
  }
  .destajo-header .monto{
    font-family:var(--mono);
    font-size:18px;
    font-weight:700;
  }
  .destajo-detail{
    display:flex;
    justify-content:space-between;
    padding:7px 14px;
    font-size:12px;
    color:var(--ink-soft);
    border-top:1px solid rgba(255,255,255,.15);
    font-family:var(--mono);
  }
  .destajo-p1{ background:var(--muro); color:#fff; }
  .destajo-p2{ background:#4a7a5a; color:#fff; }
  .destajo-p3{ background:var(--plafon); color:#fff; }
  .destajo-total-wrap{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:12px 0 4px;
    margin-top:12px;
    border-top:2px solid var(--ink);
    font-weight:700;
    font-size:15px;
  }
  .destajo-total-wrap .qty{
    font-family:var(--mono);
    font-size:20px;
    color:var(--accent);
  }
  .destajo-empty{
    text-align:center;
    padding:20px 0 8px;
    color:var(--ink-soft);
    font-size:13px;
  }

  /* Catálogo de precios */
  .catalogo-grupo{
    margin-bottom: 16px;
  }
  .catalogo-grupo:last-child{ margin-bottom: 0; }
  .catalogo-row{
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid #f1efe8;
    font-size: 13.5px;
  }
  .catalogo-row:last-child{ border-bottom: none; }
  .catalogo-row .cat-nombre{
    flex: 1;
    line-height: 1.3;
  }
  .catalogo-row .cat-unidad{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .catalogo-row .cat-precio-wrap{
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .catalogo-row .cat-peso{
    font-size: 13px;
    color: var(--ink-soft);
  }
  .catalogo-row input.cat-input{
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    width: 90px;
    padding: 6px 8px;
    border: 1.5px solid var(--line);
    border-radius: 7px;
    background: #fdfcfa;
    color: var(--ink);
    text-align: right;
  }
  .catalogo-row input.cat-input:focus{
    outline: none;
    border-color: var(--accent);
  }

  /* Costo de compra */
  .costo-row{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 7px 0;
    font-size: 13.5px;
    border-bottom: 1px solid #f1efe8;
    gap: 8px;
  }
  .costo-row:last-child{ border-bottom: none; }
  .costo-row .costo-nombre{ flex: 1; }
  .costo-row .costo-calc{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .costo-row .costo-total{
    font-family: var(--mono);
    font-weight: 700;
    white-space: nowrap;
    padding-left: 8px;
  }
  .costo-sin-precio{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    padding-left: 8px;
  }
  .costo-subtotal{
    display: flex;
    justify-content: space-between;
    padding: 8px 0 4px;
    margin-top: 4px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink-soft);
  }
  .costo-subtotal .qty{ font-family: var(--mono); }
  .costo-gran-total{
    display: flex;
    justify-content: space-between;
    padding: 12px 0 4px;
    margin-top: 8px;
    border-top: 2px solid var(--ink);
    font-size: 16px;
    font-weight: 700;
  }
  .costo-gran-total .qty{
    font-family: var(--mono);
    font-size: 18px;
    color: var(--accent);
  }
  .costo-aviso{
    font-size: 11.5px;
    color: var(--ink-soft);
    font-family: var(--mono);
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--accent-soft);
    border-radius: 7px;
    line-height: 1.5;
  }

  @media (prefers-reduced-motion: no-preference){
    .card, .result-box{
      animation: rise 0.32s ease both;
    }
    @keyframes rise{
      from{ opacity:0; transform: translateY(6px); }
      to{ opacity:1; transform: translateY(0); }
    }
  }

  /* Print styles: solo el consolidado es imprimible */
  @media print{
    body *{ visibility: hidden; }
    #print-area, #print-area *{ visibility: visible; }
    #print-area{
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      padding: 20px;
    }

function num(id){
  var v = parseFloat(document.getElementById(id).value);
  return isNaN(v) || v < 0 ? 0 : v;
}
function fmt(n, dec=2){
  return n.toLocaleString('es-MX', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function ceilTo(n, step){
  return Math.ceil(n / step) * step;
}
function selected(groupId){
  return document.querySelector('#+(groupId)+' .pill.active).dataset.val;
}
function setupPills(groupId, onChange){
  var group = document.getElementById(groupId);
  group.querySelectorAll('.pill').forEach(function(p){
    p.addEventListener('click', function(){
      group.querySelectorAll('.pill').forEach(function(x){ x.classList.remove('active'; }));
      p.classList.add('active');
      onChange && onChange();
      calcular();
    });
  });
}
// Grupo de pills donde varias pueden estar activas a la vez (toggle independiente)
function setupMultiPills(groupId, onChange){
  var group = document.getElementById(groupId);
  group.querySelectorAll('.pill').forEach(function(p){
    p.addEventListener('click', function(){
      p.classList.toggle('active');
      onChange && onChange();
      calcular();
    });
  });
}
function activeOpcionales(groupId){
  return Array.from(document.querySelectorAll('#+(groupId)+' .pill.active)).map(function(p){ return p.dataset.val; });
}

/* ============================================================
   MODO MURO / PLAFÓN
   ============================================================ */
document.querySelectorAll('.selector button').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.selector button').forEach(function(b){ b.classList.remove('active'; }));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('card-muro').style.display = mode === 'muro' ? 'block' : 'none';
    document.getElementById('card-plafon').style.display = mode === 'plafon' ? 'block' : 'none';
    document.getElementById('result-label').textContent =

    calcular();
  });
});

/* ============================================================
   CÁLCULO PRINCIPAL
   ============================================================ */
function calcular(){
  if(mode === 'muro') calcularMuro();
  else calcularPlafon();
}

// ---- MURO ----------------------------------------------------
function calcularMuro(){
  var largo = num('muro-largo');
  var altura = num('muro-altura');
  var caras = parseInt(selected('muro-caras'));
  var sistema = selected('muro-sistema'); // 'interior' | 'exterior'
  var opcionales = activeOpcionales('muro-opcionales'); // ['esquineros','aislante']
  var cantos = parseInt(document.getElementById('muro-cantos').value);
  var conBloque = selected('muro-bloque') === 'si';

  // Parámetros específicos de sistema
  var tipoPlaca, espesor, espaciamiento, calibre, anchoPerfil, acabado;
  var panelExt, acabadoExt, capasExt = [];
  var tipoPlacaAdp, espesorAdp, acabadoAdp;

  if(sistema === 'interior'){
    tipoPlaca = selected('muro-placa');
    espesor = document.getElementById('muro-espesor').value;
    espaciamiento = parseFloat(document.getElementById('muro-espaciamiento').value);
    calibre = selected('muro-calibre');
    anchoPerfil = parseFloat(document.getElementById('muro-ancho-perfil').value);
    acabado = selected('muro-acabado');
  } else if(sistema === 'adpanel'){
    tipoPlacaAdp = selected('muro-placa-adp');   // 'normal' | 'antimoho'
    espesorAdp   = document.getElementById('muro-espesor-adp').value;
    acabadoAdp   = selected('muro-acabado-adp'); // 'juntas' | 'nivel5'
  } else {
    panelExt = document.getElementById('muro-panel-exterior').value;
    espesor = document.getElementById('muro-espesor-ext').value;
    espaciamiento = parseFloat(document.getElementById('muro-espaciamiento-ext').value);
    calibre = selected('muro-calibre-ext');
    anchoPerfil = parseFloat(document.getElementById('muro-ancho-perfil-ext').value);
    acabadoExt = document.getElementById('muro-acabado-ext').value;
    capasExt = activeOpcionales('muro-capas-ext');
  }

  var areaMuro = largo * altura; // área de elevación, base del concepto
  var areaPlaca = sistema === 'adpanel' ? areaMuro : areaMuro * caras;

  document.getElementById('result-value').textContent = fmt(areaMuro);
  document.getElementById('result-detail').innerHTML =
    largo > 0 && altura > 0
      ? sistema === 'adpanel'
        ? (fmt(largo))+' × +(fmt(altura))+' m<br>AD Panel · pegado directo
        : (fmt(largo))+' × +(fmt(altura))+' m<br>+(caras)+' cara+(caras>1?'s':'')+' · placa +(fmt(areaPlaca))+' m²
      : 'Sin medidas';

  if(largo <= 0 || altura <= 0){
    showEmpty();
    return;
  }

  var PERFIL = 3.05; // m, pieza comercial

  // --- 1. HOJAS / PANELES (por superficie real de placa, +10%) ---
  var hojasCrudo = areaPlaca / PLACA_AREA;
  var hojas = Math.ceil(hojasCrudo * 1.10);

  // Los cálculos de estructura solo aplican a interior y exterior (no AD Panel)
  var mlCanal=0, piezasCanal=0, numPostes=0, piezasPostes=0;
  var fijacionesCanal=0, miniPija=0, tornillo614=0;
  var piezasBloque=0, mlBloque=0;

  if(sistema !== 'adpanel'){
    // --- 2. CANAL SUPERIOR/INFERIOR ---
    var mlCanalCrudo = largo * 2;
    mlCanal = mlCanalCrudo * 1.05;
    piezasCanal = Math.ceil(mlCanal / PERFIL);

    // --- 3. POSTES METÁLICOS ---
    numPostes = Math.ceil(largo / espaciamiento) + 1;
    piezasPostes = numPostes;

    // --- 4. FIJACIONES DE CANAL ---
    var fijacionesCanalBase = Math.ceil(mlCanalCrudo / 0.60);
    fijacionesCanal = Math.ceil(fijacionesCanalBase * 1.05);

    // --- 5. MINI PIJAS ---
    var miniPijaCrudo = numPostes * 4 * 1.05;
    miniPija = Math.ceil(miniPijaCrudo / 5) * 5;

    // --- 6. TORNILLO 6x1 1/4" ---
    var tornillo614Crudo = hojas * 50 * 1.05;
    tornillo614 = Math.ceil(tornillo614Crudo / 5) * 5;

    // --- 7. BLOQUE SÓLIDO ---
    var BLOQUE_ML = 0.77;
    var numCavidades = Math.max(0, numPostes - 1);
    if(conBloque){
      piezasBloque = numCavidades * 2;
      mlBloque = piezasBloque * BLOQUE_ML;
    }
  }

  var result;
  if(sistema === 'interior'){
    var mlCinta = areaPlaca * 1.35;
    var rollosCinta = Math.ceil(mlCinta / 12.70);
    var kgPastaJuntas = areaPlaca * 1.00;
    var kgPastaNivel5 = areaPlaca * 1.80;
    var kgPasta = acabado === 'nivel5' ? kgPastaNivel5 : kgPastaJuntas;
    var cubetasPasta = Math.ceil(kgPasta / 28);
    var lija = Math.ceil(areaPlaca / 5);
    result = {
      sistema, areaMuro, areaPlaca, caras, tipoPlaca, espesor, espaciamiento, calibre, anchoPerfil,
      hojasCrudo, hojas, mlCanal, piezasCanal, numPostes, piezasPostes,
      fijacionesCanal, miniPija, tornillo614, conBloque, piezasBloque, mlBloque,
      mlCinta, rollosCinta, acabado, kgPasta, cubetasPasta, lija, opcionales, cantos
    };

  } else if(sistema === 'adpanel'){
    // Sin estructura metálica — hojas pegadas directamente sobre muro de bloque
    var SACOS_X_HOJA = 30 / 80; // ratio 80 hojas : 30 sacos
    var sacosAdpanel = Math.ceil(hojas * SACOS_X_HOJA);
    var mlCinta = areaMuro * 1.35;
    var rollosCinta = Math.ceil(mlCinta / 12.70);
    var kgPastaJuntas = areaMuro * 1.00;
    var kgPastaNivel5 = areaMuro * 1.80;
    var kgPasta = acabadoAdp === 'nivel5' ? kgPastaNivel5 : kgPastaJuntas;
    var cubetasPasta = Math.ceil(kgPasta / 28);
    var lija = Math.ceil(areaMuro / 5) + 1;
    result = {
      sistema, areaMuro, areaPlaca: areaMuro, caras: 1,
      tipoPlacaAdp, espesorAdp, acabado: acabadoAdp,
      hojasCrudo, hojas, sacosAdpanel,
      mlCinta, rollosCinta, kgPasta, cubetasPasta, lija,
      opcionales, cantos
    };

  } else {
    // EXTERIOR cementicio
    var FACTOR_ACABADO = { basecoat: 3.33, cemenquin: 2.86, econotex: 3.57 };
    var kgAcabado = areaPlaca * FACTOR_ACABADO[acabadoExt];
    var sacosAcabado = Math.ceil(kgAcabado / 20);
    var m2Membrana = 0;
    if(capasExt.includes('membrana')) m2Membrana = areaPlaca * 1.05;
    var m2Malla = 0, rollosMalla = 0;
    if(capasExt.includes('malla')){
      m2Malla = areaPlaca * (50/45);
      rollosMalla = Math.ceil(m2Malla / 50);
    }
    result = {
      sistema, areaMuro, areaPlaca, caras, panelExt, espesor, espaciamiento, calibre, anchoPerfil,
      hojasCrudo, hojas, mlCanal, piezasCanal, numPostes, piezasPostes,
      fijacionesCanal, miniPija, tornillo614, conBloque, piezasBloque, mlBloque,
      acabadoExt, kgAcabado, sacosAcabado, capasExt, m2Membrana, m2Malla, rollosMalla,
      opcionales, cantos
    };
  }

  // --- ESQUINEROS (opcional: cantos expuestos x altura, +5%) ---
  result.mlEsquinero = 0; result.piezasEsquinero = 0;
  if(opcionales.includes('esquineros') && cantos > 0){
    var mlCrudo = cantos * altura;
    result.mlEsquinero = mlCrudo * 1.05;
    result.piezasEsquinero = Math.ceil(result.mlEsquinero / PERFIL);
  }

  // --- AISLANTE (opcional: largo x altura, +5%) ---
  result.m2Aislante = 0;
  if(opcionales.includes('aislante')){
    result.m2Aislante = areaMuro * 1.05;
  }

  currentCalc = { tipo: 'muro', areaResumen: areaMuro, data: result };
  renderInsumosMuro(result);
  renderAPU();
  renderPrecioNeto();
}

// ---- PLAFÓN ----------------------------------------------------
function calcularPlafon(){
  var largo = num('plafon-largo');
  var ancho = num('plafon-ancho');
  var sistema = selected('plafon-sistema'); // 'interior' | 'exterior'
  var sepCanalistón = parseFloat(document.getElementById('plafon-sep-canalistón').value);
  var sepCanaleta = parseFloat(document.getElementById('plafon-sep-canaleta').value);
  var acabado = selected('plafon-acabado'); // 'juntas' | 'nivel5' (aplica a ambos sistemas)

  // Parámetros específicos de sistema
  var tipoPlaca, espesor, calibre, panelExt, acabadoExt, capasExt = [];

  if(sistema === 'interior'){
    tipoPlaca = selected('plafon-placa');
    espesor = document.getElementById('plafon-espesor').value;
    calibre = document.getElementById('plafon-calibre-sel').value;
  } else {
    panelExt = document.getElementById('plafon-panel-exterior').value;
    espesor = document.getElementById('plafon-espesor-ext').value;
    calibre = selected('plafon-calibre-ext');
    acabadoExt = document.getElementById('plafon-acabado-ext').value; // basecoat | cemenquin | econotex
    capasExt = activeOpcionales('plafon-capas-ext'); // ['membrana','malla']
  }

  var areaTotal = largo * ancho;
  var perimetro = 2 * largo + 2 * ancho;

  document.getElementById('result-value').textContent = fmt(areaTotal);
  document.getElementById('result-detail').innerHTML =
    largo > 0 && ancho > 0
      ? (fmt(largo))+' × +(fmt(ancho))+' m<br>Perímetro +(fmt(perimetro))+' m
      : 'Sin medidas';

  if(largo <= 0 || ancho <= 0){
    showEmpty();
    return;
  }

  var PERFIL = 3.05; // m, pieza comercial
  var EMPALME = 0.30; // ml extra por empalme

  // --- 1. HOJAS / PANELES ---
  var hojasCrudo = areaTotal / PLACA_AREA;
  var hojasConDesp = hojasCrudo * 1.10;
  var hojas = Math.ceil(hojasConDesp);

  // --- 2. CANALISTÓN (sentido del ANCHO, líneas distribuidas sobre el LARGO) ---
  var lineasCanalistón = Math.ceil(largo / sepCanalistón) + 1; // +1 línea de cierre
  var piezasPorLineaCanalistón = Math.ceil(ancho / PERFIL);
  var empalmesPorLineaCanalistón = piezasPorLineaCanalistón - 1;
  var mlBaseCanalistón = lineasCanalistón * ancho;
  var mlEmpalmesCanalistón = lineasCanalistón * empalmesPorLineaCanalistón * EMPALME;
  var mlCanalistónCrudo = mlBaseCanalistón + mlEmpalmesCanalistón;
  var mlCanalistón = mlCanalistónCrudo * 1.05;
  var piezasCanalistón = Math.ceil(mlCanalistón / PERFIL);

  // --- 3. CANALETA DE CARGA (sentido del LARGO, líneas distribuidas sobre el ANCHO) ---
  var lineasCanaleta = Math.ceil(ancho / sepCanaleta) + 1; // +1 línea de cierre
  var piezasPorLineaCanaleta = Math.ceil(largo / PERFIL);
  var empalmesPorLineaCanaleta = piezasPorLineaCanaleta - 1;
  var mlBaseCanaleta = lineasCanaleta * largo;
  var mlEmpalmesCanaleta = lineasCanaleta * empalmesPorLineaCanaleta * EMPALME;
  var mlCanaletaCrudo = mlBaseCanaleta + mlEmpalmesCanaleta;
  var mlCanaleta = mlCanaletaCrudo * 1.05;
  var piezasCanaleta = Math.ceil(mlCanaleta / PERFIL);

  // --- 4. ÁNGULO PERIMETRAL ---
  var mlAngulo = perimetro * 1.05;
  var piezasAngulo = Math.ceil(mlAngulo / PERFIL);

  // --- 5. FIJACIONES DE ÁNGULO PERIMETRAL (c/0.60 m + 5%) ---
  var fijacionesAnguloCrudo = perimetro / 0.60;
  var fijacionesAngulo = Math.ceil(fijacionesAnguloCrudo * 1.05);

  // --- 6. COLGANTES CAL.12 (sobre líneas de canaleta, puntos según LARGO) ---
  var puntosPorCanaleta = Math.ceil(largo / 0.90) + 1; // +1 punto de cierre
  var colgantes = lineasCanaleta * puntosPorCanaleta;

  // --- 7. ALAMBRE GALV. CAL.12 (0.70 ml por colgante) ---
  var ML_COLGANTE = 0.40 + 0.10 + 0.20; // bajada + gancho + amarre
  var mlAlambre12 = colgantes * ML_COLGANTE;

  // --- 8. FIJACIONES SUPERIORES (1 por colgante) ---
  var fijacionesSuperiores = colgantes;

  // --- 9. AMARRES CAL.16 (cruces canalistón x canaleta) ---
  var amarres = lineasCanalistón * lineasCanaleta;

  // --- 10. ALAMBRE GALV. CAL.16 (0.70 ml por amarre) ---
  var ML_AMARRE = 0.70;
  var mlAlambre16 = amarres * ML_AMARRE;

  // --- 11. TORNILLO 6x1 1/4" (50 por hoja/panel + 5%) ---
  var tornillo614 = Math.ceil(hojas * 50 * 1.05);

  // --- 12. MINI PIJA 8x1/2" (8/m² + 5%, redondeo a 10) ---
  var miniPijaCrudo = areaTotal * 8 * 1.05;
  var miniPija = Math.ceil(miniPijaCrudo / 10) * 10;

  // --- 13. CINTA PARA JUNTAS (1.35 ml/m², igual para ambos sistemas) ---
  var mlCinta = areaTotal * 1.35;
  var rollosCinta = Math.ceil(mlCinta / 90); // rollo estándar ~90 ml de referencia

  // --- 14/15. PASTA READY MIX (igual para ambos sistemas) ---
  var kgPastaJuntas = areaTotal * 1.00;
  var kgPastaNivel5 = areaTotal * 1.80;
  var kgPasta = acabado === 'nivel5' ? kgPastaNivel5 : kgPastaJuntas;
  var cubetasPasta = Math.ceil(kgPasta / 28);

  // --- 16. LIJA (1 hoja por cada 5 m², +1 de reserva sobre el techo) ---
  var lijaCrudo = areaTotal / 5;
  var lijaFinal = Math.ceil(lijaCrudo) + 1;

  var result = {
    sistema, areaTotal, perimetro, espesor, calibre,
    hojasCrudo, hojas,
    sepCanalistón, lineasCanalistón, mlCanalistón, piezasCanalistón, empalmesPorLineaCanalistón,
    sepCanaleta, lineasCanaleta, mlCanaleta, piezasCanaleta, empalmesPorLineaCanaleta,
    mlAngulo, piezasAngulo,
    fijacionesAngulo,
    puntosPorCanaleta, colgantes, mlAlambre12,
    fijacionesSuperiores,
    amarres, mlAlambre16,
    tornillo614, miniPija,
    mlCinta, rollosCinta,
    acabado, kgPasta, cubetasPasta,
    lijaFinal
  };

  if(sistema === 'interior'){
    result.tipoPlaca = tipoPlaca;
  } else {
    result.panelExt = panelExt;

    // --- ACABADO DE SUPERFICIE EXTERIOR (kg/m² sobre área de placa) ---
    var FACTOR_ACABADO = { basecoat: 3.33, cemenquin: 2.86, econotex: 3.57 };
    result.acabadoExt = acabadoExt;
    result.kgAcabado = areaTotal * FACTOR_ACABADO[acabadoExt];
    result.sacosAcabado = Math.ceil(result.kgAcabado / 20);

    // --- MEMBRANA HIDRÓFUGA (1 capa, +5%) ---
    result.capasExt = capasExt;
    result.m2Membrana = 0;
    if(capasExt.includes('membrana')){
      result.m2Membrana = areaTotal * 1.05;
    }

    // --- MALLA DE FIBRA DE VIDRIO (área x 50/45 por traslape) ---
    result.m2Malla = 0; result.rollosMalla = 0;
    if(capasExt.includes('malla')){
      result.m2Malla = areaTotal * (50/45);
      result.rollosMalla = Math.ceil(result.m2Malla / 50);
    }
  }

  currentCalc = { tipo: 'plafon', areaResumen: areaTotal, data: result };
  renderInsumosPlafon(result);
  renderAPU();
  renderPrecioNeto();
}

// Detecta la clave de tarifa MO según el currentCalc actual
function claveConceptoMO(calc){
  if(!calc) return null;
  if(calc.tipo === 'plafon'){
    return calc.data.sistema === 'exterior' ? 'plafon_ext' : 'plafon_int';
  }
  var d = calc.data;
  if(d.sistema === 'adpanel'){
    return d.tipoPlacaAdp === 'antimoho' ? 'muro_adpanel_antimoho' : 'muro_adpanel_normal';
  }
  if(d.sistema === 'exterior') return 'muro_ext';
  return d.caras === 2 ? 'muro_int_2caras' : 'muro_int_1cara';
}

function labelConceptoMO(clave){
  return {
    muro_int_1cara:         'Muro interior tablaroca 1 cara',
    muro_int_2caras:        'Muro interior tablaroca 2 caras',
    muro_ext:               'Muro exterior cementicio',
    muro_adpanel_normal:    'Muro AD Panel · hoja normal',
    muro_adpanel_antimoho:  'Muro AD Panel · hoja antimoho',
    plafon_int:             'Plafón interior tablaroca',
    plafon_ext:             'Plafón exterior cementicio',
  }[clave] || clave;
}

function calcularAPU(calc){
  if(!calc) return null;
  var d = calc.data;
  var area = calc.areaResumen; // m² del concepto
  if(!area || area <= 0) return null;

  // ---- Materiales: rendimiento por m² × precio unitario ----
  var lineas = extraerLineas(calc);
  var materialesAPU = [];
  var totalMaterial = 0;

  lineas.forEach(function(linea){
    var catEntry = CATALOGO_MAESTRO.find(function(c){ return c.key === linea.key);; }
    var precio = preciosAcyma[linea.key] || 0;

    // rendimiento = cantidad técnica por m² (antes de redondear)
    var rendPorM2, unidad, precioUnitario;

    if(catEntry && catEntry.factorKg){
      // alambre: qty = ml total, convert to kg, div by area
      rendPorM2 = (linea.qty * catEntry.factorKg) / area;
      unidad = 'kg';
      precioUnitario = precio;
    } else if(catEntry && catEntry.presentacion){
      // presentación (millares, rollos, cajas, sacos): precio es por esa unidad
      rendPorM2 = linea.qty / (catEntry.presentacion.divisor * area);
      unidad = catEntry.unidad;
      precioUnitario = precio;
    } else {
      rendPorM2 = linea.qty / area;
      unidad = catEntry ? catEntry.unidad : linea.unit;
      precioUnitario = precio;
    }

    var importeLinea = rendPorM2 * precioUnitario;
    totalMaterial += importeLinea;

    materialesAPU.push({
      descripcion: linea.label,
      unidad,
      rendimiento: rendPorM2,
      precio: precioUnitario,
      importe: importeLinea,
      sinPrecio: precio <= 0
    });
  });

  // ---- Mano de obra ----
  var claveMO = claveConceptoMO(calc);
  var tarifaMO = tarifasMO[claveMO] || MO_DEFAULT[claveMO] || 145;

  // ---- Herramienta y equipo (3% sobre MO, referencia estándar) ----
  var pctHE = 0.03;
  var totalHE = tarifaMO * pctHE;

  // ---- Totales ----
  var totalDirecto = totalMaterial + tarifaMO + totalHE;

  return {
    materialesAPU, totalMaterial,
    tarifaMO, claveMO, totalHE, pctHE,
    totalDirecto,
    area
  };
}

    var lineas = extraerLineas(area);
    lineas.forEach(function(linea){
      if(!acumulado[linea.key]){
        acumulado[linea.key] = { ...linea, qty: 0 };
      }
      acumulado[linea.key].qty += linea.qty;
    });
  });

  // Agrupar por groupTitle, preservando orden de aparición
  var grupos = {}; // groupTitle -> [lineas]
  var ordenGrupos = [];
  Object.values(acumulado).forEach(function(linea){
    if(!grupos[linea.groupTitle]){
      grupos[linea.groupTitle] = [];
      ordenGrupos.push(linea.groupTitle);
    }
    grupos[linea.groupTitle].push(linea);
  });

  var html = '';
  ordenGrupos.forEach(function(groupTitle){
    html += '<div class="consol-group">
      <p class="group-title">+(groupTitle)+'</p>;
    grupos[groupTitle].forEach(function(linea){
      var dec = linea.unit === 'pzas' || linea.unit.startsWith('pzas') || linea.unit === 'hojas' || linea.unit === 'paneles' ? 0 : 2;
      html += '<div class="consol-row">
        <div class="name">+(linea.label)+'</div>
        <div class="qty">+(fmt(linea.qty, dec))+'<span class="u">+(linea.unit)+'</span></div>
      </div>;
      if(linea.presentacion){
        var cantPresentacion = Math.ceil(linea.qty / linea.presentacion.divisor);
        html += '<div class="consol-row">
          <div class="name" style="color:var(--ink-soft); font-size:12.5px;">↳ +(linea.presentacion.label)+' de compra (ref.)</div>
          <div class="qty">+(fmt(cantPresentacion, 0))+'<span class="u">+(linea.presentacion.label)+'</span></div>
        </div>;
      }
    });
    html += '</div>;
  });

  countEl.textContent = (savedAreas.length)+' +(savedAreas.length === 1 ? 'área' : 'áreas');
  body.innerHTML = html;
}

/* ============================================================
   CATÁLOGO DE PRECIOS Y COSTO DE COMPRA
   ============================================================ */
function renderCatalogo(){
  var body = document.getElementById('catalogo-body');
  var card = document.getElementById('card-catalogo');
  if(!body) return;
  card.style.display = 'block';

  // Agrupar por grupo
  var grupos = {};
  CATALOGO_MAESTRO.forEach(function(mat){
    if(!grupos[mat.grupo]) grupos[mat.grupo] = [];
    grupos[mat.grupo].push(mat);
  });

  var html = '';
  for(var [grupo, mats] of Object.entries(grupos)){
    html += '<div class="catalogo-grupo">
      <p class="group-title">+(grupo)+'</p>;
    mats.forEach(function(mat){
      var precio = preciosAcyma[mat.key] || '';
      html += '<div class="catalogo-row">
        <div class="cat-nombre">+(mat.label)+'</div>
        <div class="cat-unidad">/+(mat.unidad)+'</div>
        <div class="cat-precio-wrap">
          <span class="cat-peso">$</span>
          <input class="cat-input" type="number" min="0" step="0.01"
            data-key="+(mat.key)+'" placeholder="0.00"
            value="+(precio)+'">
        </div>
      </div>;
    });
    html += '</div>;
  }

  body.innerHTML = html;
}

function leerPreciosDelForm(){
  document.querySelectorAll('.cat-input').forEach(function(inp){
    var val = parseFloat(inp.value);
    if(!isNaN(val) && val > 0){
      preciosAcyma[inp.dataset.key] = val;
    } else {
      delete preciosAcyma[inp.dataset.key];
    }
  });
}

function renderCosto(){
  var card = document.getElementById('card-costo');
  var body = document.getElementById('costo-body');
  var printDiv = document.getElementById('costo-compra-print');
  var printBody = document.getElementById('costo-compra-print-body');
  if(!body || savedAreas.length === 0){
    if(card) card.style.display = 'none';
    if(printDiv) printDiv.style.display = 'none';
    return;
  }

  // Reconstruir acumulado
  var acumulado = {};
  savedAreas.forEach(function(area){
    extraerLineas(area).forEach(function(linea){
      if(!acumulado[linea.key]) acumulado[linea.key] = { ...linea, qty: 0 };
      acumulado[linea.key].qty += linea.qty;
    });
  });

  var granTotal = 0;
  var faltanPrecios = 0;
  var grupos = {};
  var ordenGrupos = [];
  Object.values(acumulado).forEach(function(linea){
    if(!grupos[linea.groupTitle]){ grupos[linea.groupTitle] = []; ordenGrupos.push(linea.groupTitle); }
    grupos[linea.groupTitle].push(linea);
  });

  var html = '';
  ordenGrupos.forEach(function(groupTitle){
    var subtotal = 0;
    var rowsHtml = '';

    grupos[groupTitle].forEach(function(linea){
      var catEntry = CATALOGO_MAESTRO.find(function(c){ return c.key === linea.key);; }
      var precio = preciosAcyma[linea.key] || 0;

      // Calcular cantidad de compra y unidad según catálogo maestro
      var qtyCompra, unidadCompra;
      if(catEntry && catEntry.factorKg){
        // Alambre: ml → kg
        qtyCompra = Math.ceil(linea.qty * catEntry.factorKg * 10) / 10;
        unidadCompra = 'kg';
      } else if(catEntry && catEntry.presentacion){
        // Tornillos (piezas→millares), cinta (ml→rollos), pasta (kg→cajas), etc.
        qtyCompra = Math.ceil(linea.qty / catEntry.presentacion.divisor);
        unidadCompra = catEntry.unidad;
      } else {
        qtyCompra = Math.ceil(linea.qty);
        unidadCompra = catEntry ? catEntry.unidad : linea.unit;
      }

      if(precio > 0){
        var totalLinea = precio * qtyCompra;
        subtotal += totalLinea;
        rowsHtml += '<div class="costo-row">
          <div class="costo-nombre">+(linea.label)+'</div>
          <div class="costo-calc">+(fmt(qtyCompra, catEntry && catEntry.factorKg ? 1 : 0))+' +(unidadCompra)+' × $+(fmt(precio,2))+'</div>
          <div class="costo-total">$+(fmt(totalLinea,2))+'</div>
        </div>;
      } else {
        faltanPrecios++;
        rowsHtml += '<div class="costo-row">
          <div class="costo-nombre">+(linea.label)+'</div>
          <div class="costo-calc">+(fmt(qtyCompra, catEntry && catEntry.factorKg ? 1 : 0))+' +(unidadCompra)+'</div>
          <span class="costo-sin-precio">sin precio</span>
        </div>;
      }
    });

    granTotal += subtotal;
    html += '<div class="consol-group">
      <p class="group-title">+(groupTitle)+'</p>
      +(rowsHtml)+'
      <div class="costo-subtotal">
        <span>Subtotal +(groupTitle)+'</span>
        <span class="qty">+(subtotal > 0 ? '$' + fmt(subtotal,2) : '—')+'</span>
      </div>
    </div>;
  });

  html += '<div class="costo-gran-total">
    <span>TOTAL ESTIMADO</span>
    <span class="qty">$+(fmt(granTotal,2))+'</span>
  </div>;

  if(faltanPrecios > 0){
    html += '<p class="costo-aviso">⚠ +(faltanPrecios)+' material+(faltanPrecios>1?'es':'')+' sin precio. Actualiza el Catálogo de precios para completar el estimado.</p>;
  }

  html += '<p class="costo-aviso" style="margin-top:6px;">Precios sin IVA · Acyma LP11531 + Tabla Rey 20597 · 18/Jun/2026 · Confirmar con cotización directa antes de compra.</p>;

  card.style.display = 'block';
  body.innerHTML = html;
  if(printDiv && printBody){
    printDiv.style.display = 'block';
    printBody.innerHTML = html;
  }
}
